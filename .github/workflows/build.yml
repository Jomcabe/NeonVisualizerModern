name: Build Newon (macOS)

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate app icon
        run: npm run build:icon

      - name: Build universal .dmg
        run: npx electron-builder --mac dmg --publish never
        env:
          # Personal / unsigned build — skip code signing.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Newon-macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Read version
        id: ver
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Publish a Release (what the README "Download" button points at) when a
      # v* tag is pushed, OR when this workflow is run manually from the Actions
      # tab — the manual run tags the release from package.json's version.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.v }}
          name: Newon v${{ steps.ver.outputs.v }}
          files: dist/*.dmg
          generate_release_notes: true

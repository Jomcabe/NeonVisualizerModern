<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline';" />
  <title>Newon</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="gl"></canvas>

  <!-- Subtle now-playing, tucked in the corner -->
  <div id="nowplaying" class="hidden">
    <img id="np-art" alt="" />
    <div id="np-text">
      <div id="np-title"></div>
      <div id="np-artist"></div>
    </div>
  </div>

  <!-- Synced lyric line, sprinkled at the bottom -->
  <div id="lyric" class="hidden"></div>

  <!-- Start gate: system-audio capture needs a user gesture -->
  <div id="gate">
    <div class="gate-card">
      <div class="logo">NEWON</div>
      <p class="tagline">Your music, painted in light.</p>
      <button id="startBtn">Start Listening</button>
      <p class="hint">
        Newon will ask for permission to capture your Mac's audio, then react to
        whatever you're playing. Play something in Spotify and hit start.
      </p>
      <p id="gate-error" class="error hidden"></p>
    </div>
  </div>

  <!-- Controls (toggle with the gear or the "C" key) -->
  <button id="gear" title="Settings (C)">⚙</button>
  <div id="panel" class="hidden">
    <div class="panel-row">
      <span class="panel-label">Mode</span>
      <div class="seg" id="modeSeg">
        <button data-mode="ribbons" class="active">Neon</button>
        <button data-mode="tunnel">Tunnel</button>
      </div>
    </div>
    <div class="panel-row">
      <span class="panel-label">Palette</span>
      <select id="paletteSel"></select>
    </div>
    <label class="slider-row">Sensitivity <input id="sensitivity" type="range" min="0.3" max="2.5" step="0.05" value="1.1" /></label>
    <label class="slider-row">Brightness <input id="brightness" type="range" min="0" max="1.2" step="0.02" value="0.35" /></label>
    <label class="slider-row">Glow <input id="bloom" type="range" min="0" max="2.5" step="0.05" value="1.1" /></label>
    <label class="slider-row">Trails <input id="trails" type="range" min="0" max="1" step="0.02" value="0.7" /></label>
    <div class="panel-row toggles">
      <label><input id="autoCycle" type="checkbox" checked /> Auto-cycle looks</label>
      <label><input id="showLyrics" type="checkbox" checked /> Lyrics</label>
    </div>
    <div class="panel-row">
      <button id="fsBtn" class="wide">Toggle Fullscreen (F)</button>
    </div>
  </div>

  <script src="shaders.js"></script>
  <script src="gl.js"></script>
  <script src="audio.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
